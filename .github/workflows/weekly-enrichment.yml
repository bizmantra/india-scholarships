name: Weekly Scholarship Data Enrichment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Sunday midnight UTC
  workflow_dispatch: # Allows manual triggering from GitHub UI


jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scholarship-app/package-lock.json

      - name: Install dependencies
        run: |
          cd scholarship-app
          npm ci

      - name: Run Content Quality Audit
        run: |
          # If it is a PR or commit push, enforce strict check to block invalid database updates
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Running strict verification check..."
            node scholarship-app/scripts/content-quality-audit.js --strict
          else
            # Otherwise, just run standard audit and skip strict failures during automated cron runs
            node scholarship-app/scripts/content-quality-audit.js
          fi
        env:
          NODE_ENV: production

      - name: Run Grounding Enrichment (Gemini / Perplexity)
        # Only run automated AI enrichment on schedule or dispatch, not on commits/PRs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scholarship-app/scripts/enrich-all-low-ctr-gemini.js --limit 20
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NODE_ENV: production

      - name: Commit and push changes if updated
        # Only commit back to main during cron schedules
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholarship-app/data/scholarships.db scholarship-app/data/content-quality-report.md scholarship-app/data/content-quality-audit.csv
          if git diff --staged --quiet; then
            echo "No database changes. Skipping commit."
          else
            git commit -m "chore: automated weekly data enrichment & audit [skip ci]"
            git push origin main
          fi

      - name: Sync Codebase & Metrics to Notion
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scholarship-app/scripts/sync-to-notion.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID_BACKLOG: "ca53d5c3-40bb-4453-aa02-1c0618ec585d"
          NOTION_DATABASE_ID_PIPELINE: "3952e0a0-3f1e-80bb-bd0b-ebc25b27b00f"
          NOTION_PAGE_ID_DOC_HUB: "3952e0a0-3f1e-8173-a5d4-cb28b549a1fc"
          NOTION_PAGE_ID_INVENTORY: "3952e0a0-3f1e-8177-b4ba-fca40195b1b8"
          NOTION_PAGE_ID_CHANGELOG: "3952e0a0-3f1e-81c5-8279-ecd3058c2c82"

      - name: Trigger Vercel Redeployment
        # Only redeploy on schedules
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"


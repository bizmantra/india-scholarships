name: Weekly Scholarship Data Enrichment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Sunday midnight UTC (Runs Sunday 5:30 AM IST)
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scholarship-app/package-lock.json

      - name: Install dependencies
        run: |
          cd scholarship-app
          npm ci

      - name: Run Content Quality Audit
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Running strict verification check..."
            node scholarship-app/scripts/content-quality-audit.js --strict
          else
            node scholarship-app/scripts/content-quality-audit.js
          fi
        env:
          NODE_ENV: production

      - name: Sync Google Search Console Live Traffic Cache
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scholarship-app/scripts/sync-gsc-cache.js
        env:
          GOOGLE_SERVICES_CLIENT_EMAIL: ${{ secrets.GOOGLE_SERVICES_CLIENT_EMAIL }}
          GOOGLE_SERVICES_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICES_PRIVATE_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          NODE_ENV: production

      - name: Run Grounding Enrichment (Gemini Flash)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scholarship-app/scripts/enrich-all-low-ctr-gemini.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production

      - name: Generate Weekly Email Body
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scholarship-app/scripts/generate-email-reports.js --type weekly

      - name: Send Email Report
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Weekly Scholarship Enrichment Report"
          to: bizmantra@gmail.com
          from: "India Scholarships Freshness Pipeline <${{ secrets.EMAIL_USERNAME }}>"
          secure: true
          html_body: file://${{ github.workspace }}/scholarship-app/data/weekly-email-body.html

      - name: Commit and push changes if updated
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholarship-app/data/scholarships.db scholarship-app/data/content-quality-report.md scholarship-app/data/content-quality-audit.csv
          if git diff --staged --quiet; then
            echo "No database changes. Skipping commit."
          else
            git commit -m "chore: automated weekly data enrichment & audit [skip ci]"
            git push origin main
          fi

      - name: Broadcast New Entries to Telegram
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scholarship-app/scripts/post-new-to-telegram.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NODE_ENV: production

      - name: Push Database to Turso
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scholarship-app/scripts/push-to-turso.js
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Trigger Vercel Redeployment
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
